# Netlify configuration for PC Hotelería PWA

[build]
  publish = "."

# PWA routing: serve index.html for all routes not matching a file
[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

# ── Security Headers (aplicados a TODAS las páginas) ─────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Evitar que la app se incruste en iframes de otros sitios (clickjacking)
    X-Frame-Options = "SAMEORIGIN"
    # Evitar que el browser interprete archivos con un MIME type incorrecto
    X-Content-Type-Options = "nosniff"
    # Limitar información de referrer enviada a terceros
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Deshabilitar APIs del navegador no necesarias
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Content Security Policy:
    # - default-src 'self': solo recursos del mismo origen por defecto
    # - script-src: permite scripts propios + CDNs externos (Tailwind, Supabase ESM, SheetJS)
    # - connect-src: permite conexiones a Supabase REST+Realtime, CDN jsdelivr (Supabase ESM), SheetJS
    # - style-src: estilos propios + Google Fonts + estilos inline (necesarios para la app)
    # - font-src: fuentes de Google Fonts + data URIs
    # - img-src: imágenes propias + data URIs (para logos en base64) + blobs
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://cdn.sheetjs.com https://esm.sh https://unpkg.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net https://esm.sh https://unpkg.com https://fonts.googleapis.com https://cdn.sheetjs.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; worker-src 'self';"

# ── Cache: JS (no-cache para siempre recibir la versión más reciente) ─────────
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# ── Cache: CSS ────────────────────────────────────────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# ── Cache: Imágenes (1 día) ───────────────────────────────────────────────────
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Cache: HTML (siempre fresco) ──────────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# ── PWA Manifest ──────────────────────────────────────────────────────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/manifest+json"

# ── Service Worker (nunca cachear) ───────────────────────────────────────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

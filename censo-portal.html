<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Censo de Camas · PC Hotelería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --indigo: #6366f1; --purple: #8b5cf6; --amber: #f59e0b;
      --green: #10b981;  --red: #ef4444;
      --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
      --gray-500: #64748b; --gray-700: #334155; --gray-900: #0f172a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--gray-50); min-height: 100vh; }

    /* ── Header ────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #1e1b4b, #312e81, #4338ca);
      color: white; padding: 14px 18px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(99,102,241,.4);
    }
    .header-inner { max-width: 600px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
    .h-logo { width: 38px; height: 38px; background: rgba(255,255,255,.15); border-radius: 10px;
               display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .h-title { font-size: 15px; font-weight: 800; }
    .h-sub   { font-size: 11px; opacity: .75; margin-top: 1px; }
    .h-date  { margin-left: auto; text-align: right; }
    .h-day   { font-size: 22px; font-weight: 900; line-height: 1; }
    .h-mon   { font-size: 10px; opacity: .75; text-transform: uppercase; }

    /* ── Main ──────────────────────────────────────── */
    .main { max-width: 600px; margin: 0 auto; padding: 16px; padding-bottom: 110px; }

    /* ── Screens ───────────────────────────────────── */
    .screen { display: none; animation: fadeIn .25s ease; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Card ──────────────────────────────────────── */
    .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 14px;
             box-shadow: 0 2px 10px rgba(0,0,0,.07); border: 1px solid var(--gray-200); }

    /* ── Labels / Inputs ───────────────────────────── */
    .lbl { font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase;
            letter-spacing: .5px; display: block; margin-bottom: 7px; }
    select, input[type=text] {
      width: 100%; padding: 12px 14px; border-radius: 11px; border: 1.5px solid var(--gray-200);
      font-size: 15px; font-family: inherit; color: var(--gray-900); background: white; outline: none;
      transition: border-color .2s; -webkit-appearance: none;
    }
    select:focus, input[type=text]:focus { border-color: var(--indigo); }

    /* ── Buttons ───────────────────────────────────── */
    .btn { width: 100%; padding: 14px; border-radius: 13px; border: none; font-size: 15px;
            font-weight: 700; font-family: inherit; cursor: pointer; transition: all .18s; }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: linear-gradient(135deg, var(--indigo), var(--purple)); color: white;
                    box-shadow: 0 4px 14px rgba(99,102,241,.35); }
    .btn-success { background: linear-gradient(135deg, var(--green), #059669); color: white;
                    box-shadow: 0 4px 14px rgba(16,185,129,.35); }
    .btn-amber   { background: linear-gradient(135deg, var(--amber), #d97706); color: white;
                    box-shadow: 0 4px 14px rgba(245,158,11,.35); }
    .btn:disabled { background: #cbd5e1; color: #94a3b8; box-shadow: none; cursor: not-allowed; }

    /* ── Section title ─────────────────────────────── */
    .sec-title { font-size: 13px; font-weight: 700; color: var(--indigo); margin-bottom: 12px;
                  display: flex; align-items: center; gap: 8px; }
    .badge { background: var(--indigo); color: white; border-radius: 99px; font-size: 11px;
              padding: 1px 9px; font-weight: 800; }

    /* ── Room card ─────────────────────────────────── */
    .room-card { background: white; border-radius: 14px; margin-bottom: 10px; overflow: hidden;
                  box-shadow: 0 2px 8px rgba(0,0,0,.06); border: 1px solid var(--gray-200);
                  transition: box-shadow .2s; }
    .room-card.done { border-color: var(--green); }
    .room-head {
      background: linear-gradient(135deg, #4338ca, #7c3aed);
      color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .room-head .rnum { font-size: 15px; font-weight: 800; }
    .room-head .rid  { font-size: 11px; opacity: .8; font-family: monospace; }
    .room-head .tick { font-size: 18px; }
    .room-body { padding: 12px 16px; }

    /* ── Radio options ─────────────────────────────── */
    .radio-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .radio-opt  { display: flex; align-items: center; gap: 5px; cursor: pointer; }
    .radio-opt input[type=radio] { display: none; }
    .radio-pill {
      padding: 6px 13px; border-radius: 99px; font-size: 12px; font-weight: 700;
      border: 2px solid var(--gray-200); color: var(--gray-500); background: var(--gray-50);
      transition: all .15s; cursor: pointer; user-select: none;
    }
    .radio-opt input:checked + .radio-pill { border-color: transparent; color: white; }
    .radio-opt.opt-sin_ocupar  input:checked + .radio-pill { background: var(--gray-500); }
    .radio-opt.opt-dia         input:checked + .radio-pill { background: #2563eb; }
    .radio-opt.opt-noche       input:checked + .radio-pill { background: #7c3aed; }
    .radio-opt.opt-2_dia       input:checked + .radio-pill { background: var(--amber); }
    .radio-opt.opt-2_noche     input:checked + .radio-pill { background: #dc2626; }
    .radio-opt.opt-3_dia       input:checked + .radio-pill { background: #0891b2; }
    .radio-opt.opt-3_noche     input:checked + .radio-pill { background: #4a1d96; }
    /* Borde especial para opciones de cama 3 (sin seleccionar) */
    .radio-opt.opt-3_dia  .radio-pill,
    .radio-opt.opt-3_noche .radio-pill { border-color: #7c3aed; color: #7c3aed; font-weight:700; }

    /* ── Bottom bar ────────────────────────────────── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: white;
      border-top: 1px solid var(--gray-200); padding: 14px 18px;
      box-shadow: 0 -4px 20px rgba(0,0,0,.08); z-index: 50;
    }
    .bottom-inner { max-width: 600px; margin: 0 auto; display: flex; gap: 10px; align-items: center; }
    .counter-text { font-size: 12px; font-weight: 700; color: var(--gray-500); white-space: nowrap; }

    /* ── Tabs ──────────────────────────────────────── */
    .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .tab  { flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid var(--gray-200);
             background: white; font-size: 12px; font-weight: 700; color: var(--gray-500); cursor: pointer;
             text-align: center; transition: all .15s; }
    .tab.active { background: var(--indigo); color: white; border-color: var(--indigo); }

    /* ── Departure card ────────────────────────────── */
    .dep-row { display: flex; justify-content: space-between; align-items: center;
                padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
    .dep-row:last-child { border-bottom: none; }
    .dep-emp  { font-size: 13px; font-weight: 700; color: var(--gray-900); }
    .dep-sub  { font-size: 11px; color: var(--gray-500); }
    .dep-num  { font-size: 22px; font-weight: 900; color: var(--red); }
    .dep-lbl  { font-size: 10px; color: var(--gray-500); text-align: right; }

    /* ── Toast ─────────────────────────────────────── */
    #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
              background: var(--gray-900); color: white; padding: 11px 22px; border-radius: 99px;
              font-size: 13px; font-weight: 600; opacity: 0; transition: all .3s; z-index: 9999;
              white-space: nowrap; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Loading ───────────────────────────────────── */
    .spin { width: 28px; height: 28px; border: 3px solid var(--gray-200);
             border-top-color: var(--indigo); border-radius: 50%;
             animation: spin .7s linear infinite; margin: 30px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Estado de Limpieza ─────────────────────────────── */
    .clean-row { display:flex; align-items:center; gap:8px; margin-top:10px; padding-top:10px; border-top:1px solid var(--gray-100); flex-wrap:wrap; }
    .clean-label { font-size:11px; font-weight:700; color:var(--gray-500); white-space:nowrap; }
    .clean-pills { display:flex; gap:6px; flex-wrap:wrap; }
    .clean-pill  { padding:5px 11px; border-radius:99px; font-size:11px; font-weight:700; border:2px solid var(--gray-200); color:var(--gray-500); background:var(--gray-50); cursor:pointer; transition:all .15s; font-family:inherit; }
    .clean-pill.active-limpia  { background:#10b981; color:white; border-color:transparent; }
    .clean-pill.active-sucia   { background:#ef4444; color:white; border-color:transparent; }
    .clean-pill.active-proceso { background:#f59e0b; color:white; border-color:transparent; }

    /* ── Banner borrador recuperado ─────────────────────── */
    #draft-banner {
      position:fixed; top:72px; left:50%; transform:translateX(-50%);
      background:#1e1b4b; color:white; padding:9px 18px; border-radius:99px;
      font-size:12px; font-weight:700; z-index:200;
      display:flex; align-items:center; gap:10px;
      box-shadow:0 4px 20px rgba(0,0,0,.25); animation:fadeIn .3s ease; white-space:nowrap;
    }
    #draft-banner .draft-close {
      background:rgba(255,255,255,.2); border:none; color:white;
      border-radius:99px; padding:3px 10px; font-size:11px; font-weight:700; cursor:pointer;
    }

    /* ── Banner de Período (Día / Noche) ──────────────────── */
    .period-banner {
      padding: 12px 18px;
      display: flex; align-items: center; justify-content: space-between;
      font-family: 'Inter', sans-serif;
      position: sticky; top: 66px; z-index: 95;
      border-bottom: 1px solid rgba(255,255,255,.15);
    }
    .period-banner.dia   { background: linear-gradient(135deg, #1e40af, #2563eb); color: white; }
    .period-banner.noche { background: linear-gradient(135deg, #4c1d95, #7c3aed); color: white; }
    .pb-title    { font-size: 14px; font-weight: 900; line-height: 1.2; }
    .pb-deadline { font-size: 11px; opacity: .85; font-weight: 600; margin-top: 2px; }
    .pb-clock    { font-size: 26px; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <img src="aramark.png" alt="Aramark"
      style="height:44px;object-fit:contain;filter:brightness(0) invert(1);flex-shrink:0">
    <div>
      <div class="h-title">Portal Censo Terreno</div>
      <div class="h-sub">PC Hotelería · Aramark</div>
    </div>
    <div class="h-date" id="hdr-date"></div>
  </div>
</header>

<!-- ══ BANNER PERÍODO DÍA / NOCHE ══ -->
<div id="period-banner" class="period-banner dia">
  <div>
    <div class="pb-title" id="pb-title">🌞 Período Día</div>
    <div class="pb-deadline" id="pb-deadline">Registrar antes de las 12:00</div>
  </div>
  <div class="pb-clock">⏰</div>
</div>

<main class="main">

  <!-- ══ SCREEN 1: Identificación con RUT ══ -->
  <div class="screen active" id="s-ident">
    <div class="card" style="margin-top:16px">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:48px;margin-bottom:8px">🔐</div>
        <div style="font-size:18px;font-weight:800;color:var(--gray-900)">Identificación</div>
        <div style="font-size:13px;color:var(--gray-500);margin-top:4px">Ingresa tu RUT para acceder al censo</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:14px;align-items:end">
        <div>
          <label class="lbl">RUT (sin puntos)</label>
          <input type="text" id="inp-rut" placeholder="12345678" maxlength="9" autocomplete="off"
            style="letter-spacing:2px;font-family:monospace;font-size:16px">
        </div>
        <div>
          <label class="lbl">DV</label>
          <input type="text" id="inp-dv" placeholder="K" maxlength="1" autocomplete="off"
            style="width:64px;text-align:center;text-transform:uppercase;font-family:monospace;font-size:18px;font-weight:800">
        </div>
      </div>
      <div id="rut-error" style="display:none;background:#fee2e2;color:#b91c1c;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:12px"></div>
      <button class="btn btn-primary" id="btn-ingresar" onclick="irASeleccion()">Verificar e ingresar →</button>
    </div>
  </div>

  <!-- ══ SCREEN 2: Selección Edificio / Pabellón ══ -->
  <div class="screen" id="s-select">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-size:15px;font-weight:800;color:var(--gray-900)">Seleccionar Pabellón</div>
        <span id="hola-nombre" style="font-size:12px;color:var(--indigo);font-weight:700"></span>
      </div>
      <div style="margin-bottom:12px">
        <label class="lbl">Edificio</label>
        <select id="sel-edif" onchange="cargarPabellones()">
          <option value="">— Seleccionar edificio —</option>
        </select>
      </div>
      <div style="margin-bottom:14px">
        <label class="lbl">Pabellón / Piso</label>
        <select id="sel-pab" onchange="selPabChanged()">
          <option value="">— Seleccionar pabellón —</option>
        </select>
      </div>
      <!-- Nivel/Piso del pabellón -->
      <div id="div-nivel" style="display:none;margin-bottom:14px">
        <label class="lbl">Nivel / Piso</label>
        <select id="sel-nivel" style="border-color:var(--indigo)" onchange="cargarHabitaciones()">
          <option value="">— Todos los pisos —</option>
        </select>
      </div>
      <!-- Botón de recarga manual (secundario, ya es automático) -->
      <button class="btn" id="btn-cargar" onclick="cargarHabitaciones()"
        style="background:var(--gray-100);color:var(--gray-700);border:1.5px solid var(--gray-200);font-size:13px">
        🔄 Actualizar lista
      </button>
    </div>

    <!-- Tabs: Censo / Bajadas -->
    <div class="tabs">
      <button class="tab active" id="tab-censo"  onclick="showTab('censo')">📋 Censo del Período</button>
      <button class="tab"        id="tab-bajadas" onclick="showTab('bajadas')">📤 Bajadas por Empresa</button>
    </div>

    <div id="panel-censo"  class="screen active"></div>
    <div id="panel-bajadas" class="screen"></div>
  </div>

</main>

<!-- Bottom save bar (hidden initially) -->
<div class="bottom-bar" id="bottom-bar" style="display:none">
  <div class="bottom-inner">
    <div style="display:flex;flex-direction:column;gap:2px;min-width:76px">
      <div class="counter-text" id="counter-text">0 / 0</div>
      <div style="font-size:10px;color:var(--gray-500);font-weight:700" id="clean-counter-text"></div>
    </div>
    <button class="btn btn-success" id="btn-guardar" onclick="guardarCenso()" style="flex:1">
      💾 Guardar Censo del Piso
    </button>
    <button class="btn btn-amber" id="btn-pdf" onclick="exportarPDF()" title="Exportar PDF del Censo"
      style="padding:14px 16px;min-width:50px;flex:0 0 auto">📄</button>
  </div>
</div>

<div id="toast"></div>
<div id="draft-banner" style="display:none">
  <span>📝 Borrador recuperado</span>
  <button class="draft-close" onclick="descartarDraft()">Descartar</button>
</div>

<script type="module">
import { supabase } from './js/supabaseClient.js';

// ── State ─────────────────────────────────────────────────────────────
let _nombre    = '';
let _edificioId = null;
let _pabellonId = null;
let _pabNombre  = '';
let _habitaciones = [];
let _censoHoy   = {}; // habitacion_id → estado del período activo
let _activeTab  = 'censo';

// ── Período según hora del día ──────────────────────────────────────────
function getPeriodo() { return new Date().getHours() < 12 ? 'dia' : 'noche'; }

function _actualizarBannerPeriodo() {
  const p   = getPeriodo();
  const now = new Date();
  let dl = new Date(now);
  if (p === 'dia') { dl.setHours(12, 0, 0, 0); }
  else { dl.setDate(dl.getDate() + 1); dl.setHours(0, 0, 0, 0); }
  const ms = dl - now;
  const hh = Math.floor(ms / 3600000);
  const mm = Math.floor((ms % 3600000) / 60000);
  const cntd = ms > 0 ? `Cierra en ${hh}h ${mm}m` : '¡Período cerrado!';

  const banner = document.getElementById('period-banner');
  if (!banner) return;
  banner.className = `period-banner ${p}`;
  document.getElementById('pb-title').textContent    = p === 'dia' ? '🌞 Período Día' : '🌙 Período Noche';
  document.getElementById('pb-deadline').textContent = p === 'dia'
    ? `Turno diurno · Registrar antes de las 12:00 · ${cntd}`
    : `Turno nocturno · Registrar antes de las 00:00 · ${cntd}`;
}
_actualizarBannerPeriodo();
setInterval(_actualizarBannerPeriodo, 60000);

// ── Header date ────────────────────────────────────────────────────────
(function() {
  const now = new Date();
  const el  = document.getElementById('hdr-date');
  el.innerHTML = `<div class="h-day">${now.getDate().toString().padStart(2,'0')}</div>
                  <div class="h-mon">${now.toLocaleDateString('es-CL',{month:'short',year:'numeric'})}</div>`;
})();

// ── Screen helpers ─────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
window.showTab = function(tab) {
  _activeTab = tab;
  document.getElementById('tab-censo').classList.toggle('active', tab === 'censo');
  document.getElementById('tab-bajadas').classList.toggle('active', tab === 'bajadas');
  document.getElementById('panel-censo').classList.toggle('active', tab === 'censo');
  document.getElementById('panel-bajadas').classList.toggle('active', tab === 'bajadas');
  if (tab === 'bajadas') cargarBajadas();
};

// ── Toast ───────────────────────────────────────────────────────────────
function toast(msg, dur = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── Step 1: Validar RUT chileno ────────────────────────────────────────
function calcularDV(rut) {
  let suma = 0, mul = 2, n = parseInt(rut, 10);
  while (n > 0) { suma += (n % 10) * mul; n = Math.floor(n / 10); mul = mul < 7 ? mul + 1 : 2; }
  const r = 11 - (suma % 11);
  return r === 11 ? '0' : r === 10 ? 'K' : String(r);
}

window.irASeleccion = async function() {
  const rutRaw = document.getElementById('inp-rut').value.trim().replace(/\./g,'');
  const dvRaw  = document.getElementById('inp-dv').value.trim().toUpperCase();
  const errEl  = document.getElementById('rut-error');
  const btn    = document.getElementById('btn-ingresar');
  errEl.style.display = 'none';

  if (!rutRaw || !dvRaw) {
    errEl.textContent = '⚠️ Ingresa RUT y dígito verificador';
    errEl.style.display = 'block'; return;
  }
  if (!/^\d{7,9}$/.test(rutRaw)) {
    errEl.textContent = '⚠️ RUT inválido (solo números, sin puntos)';
    errEl.style.display = 'block'; return;
  }
  if (calcularDV(rutRaw) !== dvRaw) {
    errEl.textContent = '❌ Dígito verificador incorrecto';
    errEl.style.display = 'block'; return;
  }

  btn.disabled = true; btn.textContent = '⏳ Ingresando…';
  const rutCompleto = rutRaw + '-' + dvRaw;

  // Intentar obtener nombre desde v2_asignaciones (opcional, no bloquea el acceso)
  let nombreMostrar = rutCompleto;
  try {
    const { data } = await supabase.from('v2_asignaciones')
      .select('nombre_huesped').eq('rut_huesped', rutCompleto)
      .is('fecha_checkout', null).limit(1);
    if (data?.[0]?.nombre_huesped) nombreMostrar = data[0].nombre_huesped;
  } catch(_) { /* sin problema, continúa igual */ }

  _nombre = nombreMostrar;
  document.getElementById('hola-nombre').textContent = '👤 ' + _nombre;
  btn.disabled = false; btn.textContent = 'Verificar e ingresar →';
  cargarEdificios();
  showScreen('s-select');
};

// ── Step 2a: Load edificios ─────────────────────────────────────────────
async function cargarEdificios() {
  // Cargar edificios
  const { data: edifs } = await supabase.from('v2_edificios').select('id,nombre').order('nombre');
  const sel = document.getElementById('sel-edif');
  sel.innerHTML = '<option value="">— Todos los edificios —</option>' +
    (edifs || []).map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');

  // Cargar TODOS los pabellones agrupados desde el inicio
  await _cargarTodosPabellones();
}

// Carga todos los pabellones agrupados por edificio (sin filtro)
async function _cargarTodosPabellones() {
  const { data } = await supabase
    .from('v2_pabellones')
    .select('id,nombre,edificio_id,v2_edificios(nombre)')
    .order('nombre');

  const sel = document.getElementById('sel-pab');
  // Agrupar por edificio
  const grupos = {};
  (data || []).forEach(p => {
    const edNombre = p.v2_edificios?.nombre || 'Sin edificio';
    if (!grupos[edNombre]) grupos[edNombre] = [];
    grupos[edNombre].push(p);
  });

  sel.innerHTML = '<option value="">— Seleccionar pabellón —</option>' +
    Object.entries(grupos).sort((a,b)=>a[0].localeCompare(b[0],'es')).map(([edNombre, pabs]) =>
      `<optgroup label="📍 ${edNombre}">${pabs.map(p =>
        `<option value="${p.id}">${p.nombre}</option>`).join('')}</optgroup>`
    ).join('');
}

// ── Step 2b: Filter pabellones by edificio ──────────────────────────────
window.cargarPabellones = async function() {
  _edificioId = document.getElementById('sel-edif').value;
  if (!_edificioId) {
    // Sin filtro → mostrar todos
    await _cargarTodosPabellones();
    return;
  }
  const sel = document.getElementById('sel-pab');
  sel.innerHTML = '<option value="">— Seleccionar pabellón —</option>';
  document.getElementById('btn-cargar').disabled = true;
  const { data } = await supabase.from('v2_pabellones')
    .select('id,nombre').eq('edificio_id', _edificioId).order('nombre');
  sel.innerHTML = '<option value="">— Seleccionar pabellón —</option>' +
    (data || []).map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
};

window.selPabChanged = async function() {
  const v = document.getElementById('sel-pab').value;
  _pabellonId = v || null;
  _pabNombre  = document.getElementById('sel-pab').selectedOptions[0]?.text || '';
  const divNivel = document.getElementById('div-nivel');
  const selNivel = document.getElementById('sel-nivel');
  if (!v) { divNivel.style.display = 'none'; return; }
  // Cargar niveles disponibles en este pabellón
  const { data: niveles } = await supabase.from('v2_habitaciones')
    .select('nivel').eq('pabellon_id', v).not('nivel','is',null);
  const unicos = [...new Set((niveles||[]).map(n=>n.nivel).filter(Boolean))].sort();
  selNivel.innerHTML = '<option value="">— Todos los pisos —</option>' +
    unicos.map(n => `<option value="${n}">${n}</option>`).join('');
  divNivel.style.display = unicos.length > 1 ? 'block' : 'none';
  // ✅ AUTO-CARGA: cargar habitaciones automáticamente
  await cargarHabitaciones();
};

window.cargarHabitaciones = async function() {
  if (!_pabellonId) return;
  const panel = document.getElementById('panel-censo');
  panel.innerHTML = '<div class="spin"></div>';
  document.getElementById('bottom-bar').style.display = 'none';

  const nivelFil = document.getElementById('sel-nivel')?.value || '';

  let habQ = supabase.from('v2_habitaciones')
    .select('id_custom,numero_hab,nivel,cantidad_camas')
    .eq('pabellon_id', _pabellonId)
    .order('numero_hab');
  if (nivelFil) habQ = habQ.eq('nivel', nivelFil);

  // ── Cargar hab, censo existente (filtrado por período) y camas-3 ────────
  const periodoActual = getPeriodo();
  const [{ data: habs }, censoRes, cama3Res] = await Promise.all([
    habQ,
    supabase.from('v2_censo_registros')
      .select('habitacion_id,estado')
      .eq('fecha', todayISO())
      .eq('pabellon_id', _pabellonId)
      .eq('periodo', periodoActual),   // ← solo el período activo
    // Camas con numero_cama=3 que NO están Deshabilitadas
    supabase.from('v2_camas')
      .select('habitacion_id, estado')
      .eq('numero_cama', 3)
      .neq('estado', 'Deshabilitada')
  ]);

  _habitaciones = habs || [];

  // Set de habitacion_ids que tienen cama 3 activa
  window._habsCon3 = new Set(
    (cama3Res.data || []).map(c => c.habitacion_id)
  );

  _censoHoy = {};

  if (censoRes.error) {
    panel.innerHTML = `
      <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px;margin-bottom:12px;font-size:12px;color:#92400e">
        <strong>⚠️ Tabla v2_censo_registros no encontrada.</strong><br>
        Ejecuta el archivo <code>sql/censo_periodos_migration.sql</code> en Supabase para habilitar el guardado.
      </div>`;
  } else {
    (censoRes.data || []).forEach(r => { _censoHoy[r.habitacion_id] = r.estado; });
  }

  if (!_habitaciones.length) {
    panel.innerHTML += `<div class="card" style="text-align:center;color:var(--gray-500)">Sin habitaciones en este piso</div>`;
    return;
  }

  // 💾 Pre-cargar estados guardados (limpieza local + borrador de censo)
  cargarLimpiezaLocal();
  restaurarDraft();

  renderHabitaciones(panel);

  document.getElementById('bottom-bar').style.display = 'block';
  actualizarContador();
  actualizarContadorLimpieza();
};

// ── Opciones según período activo ───────────────────────────────────────
// Período Día (antes de las 12:00) → solo opciones de turno día
// Período Noche (después de las 12:00) → solo opciones de turno noche
const OPCIONES_DIA   = [
  { val: 'sin_ocupar', lbl: '🚫 Sin Ocupar'   },
  { val: 'dia',        lbl: '☀️ 1 Persona Día' },
  { val: '2_dia',      lbl: '☀️ 2 Personas'    },
];
const OPCIONES_NOCHE = [
  { val: 'sin_ocupar', lbl: '🚫 Sin Ocupar'     },
  { val: 'noche',      lbl: '🌙 1 Persona Noche' },
  { val: '2_noche',    lbl: '🌙 2 Personas'      },
];
const OPCIONES_C3_DIA   = [{ val: '3_dia',   lbl: '☀️ 3 Personas' }];
const OPCIONES_C3_NOCHE = [{ val: '3_noche', lbl: '🌙 3 Personas' }];

function opcionesHab(h) {
  const p      = getPeriodo();
  const tieneC3 = window._habsCon3?.has(h.id_custom);
  if (p === 'dia') {
    return tieneC3 ? [...OPCIONES_DIA, ...OPCIONES_C3_DIA] : OPCIONES_DIA;
  } else {
    return tieneC3 ? [...OPCIONES_NOCHE, ...OPCIONES_C3_NOCHE] : OPCIONES_NOCHE;
  }
}

function renderHabitaciones(panel) {
  const hoy = todayISO();
  const p   = getPeriodo();
  const pLabel = p === 'dia' ? '🌞 Turno Día' : '🌙 Turno Noche';
  const pColor = p === 'dia' ? '#1d4ed8' : '#7c3aed';
  panel.innerHTML = `
    <div class="sec-title" style="flex-wrap:wrap;gap:8px">
      🏠 <span>${_pabNombre}</span>
      <span class="badge">${_habitaciones.length} hab.</span>
      <span style="font-size:11px;color:var(--gray-500);font-weight:400">${hoy}</span>
      <span style="background:${pColor};color:#fff;border-radius:99px;font-size:11px;font-weight:800;padding:2px 10px;margin-left:auto">${pLabel}</span>
    </div>` +
    _habitaciones.map(h => {
      const est  = _censoHoy[h.id_custom] || '';
      const done = !!est;
      const ops  = opcionesHab(h);
      const tiene3 = window._habsCon3?.has(h.id_custom) || false;
      const rads = ops.map(op => `
        <label class="radio-opt opt-${op.val}">
          <input type="radio" name="hab_${h.id_custom}" value="${op.val}"
            ${est === op.val ? 'checked' : ''}
            onchange="onRadioChange('${h.id_custom}', this.value)">
          <span class="radio-pill">${op.lbl}</span>
        </label>`).join('');
      return `
        <div class="room-card ${done ? 'done' : ''}" id="rc-${h.id_custom}">
          <div class="room-head">
            <div>
              <div class="rnum">Habitación ${h.numero_hab}
                ${tiene3 ? '<span style="background:#7c3aed;color:#fff;font-size:9px;font-weight:800;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle">🛏️ C3</span>' : ''}
              </div>
              <div class="rid">${h.id_custom}${h.nivel ? ' · Nivel ' + h.nivel : ''}${tiene3 ? ' · Cama 3 habilitada' : ''}</div>
            </div>
            <div class="tick" id="tick-${h.id_custom}">${done ? '✅' : '⬜'}</div>
          </div>
          <div class="room-body">
            <div class="radio-grid">${rads}</div>
            ${cleaningUI(h.id_custom)}
          </div>
        </div>`;
    }).join('');
}

// ── Radio change ────────────────────────────────────────────────────────
window.onRadioChange = function(habId, estado) {
  _censoHoy[habId] = estado;
  const rc = document.getElementById(`rc-${habId}`);
  const tk = document.getElementById(`tick-${habId}`);
  rc.classList.add('done');
  tk.textContent = '✅';
  actualizarContador();
  autoGuardar(); // 💾 Auto-guardado en borrador
};

function actualizarContador() {
  const total     = _habitaciones.length;
  const marcadas  = Object.keys(_censoHoy).filter(k =>
    _habitaciones.find(h => h.id_custom === k)).length;
  document.getElementById('counter-text').textContent = `${marcadas} / ${total} marcadas`;
  document.getElementById('btn-guardar').disabled = marcadas === 0;
}

// ── Save censo ─────────────────────────────────────────────────────────
window.guardarCenso = async function() {
  const btn    = document.getElementById('btn-guardar');
  const periodo = getPeriodo();
  btn.disabled = true;
  btn.textContent = '⏳ Guardando…';
  const fecha = todayISO();
  const rows = Object.entries(_censoHoy)
    .filter(([id]) => _habitaciones.find(h => h.id_custom === id))
    .map(([habitacion_id, estado]) => ({
      fecha, habitacion_id, estado, periodo,
      pabellon_id:   _pabellonId,
      edificio_id:   _edificioId,
      registrado_por: _nombre
    }));

  const { error } = await supabase.from('v2_censo_registros')
    .upsert(rows, { onConflict: 'habitacion_id,fecha,periodo' });

  if (error) {
    toast('❌ Error: ' + error.message, 4000);
    btn.disabled = false;
    btn.textContent = '💾 Guardar Censo del Piso';
    return;
  }
  const pLabel = periodo === 'dia' ? 'Turno Día' : 'Turno Noche';
  toast(`✅ ${rows.length} hab. guardadas (${pLabel})`);
  btn.textContent = '💾 Guardar Censo del Piso';
  btn.disabled = false;
  clearDraft();
};

// ── Bajadas — próximos 3 días (para que se preparen) ──────────────────
async function cargarBajadas() {
  const panel = document.getElementById('panel-bajadas');
  if (!_pabellonId) {
    panel.innerHTML = `<div class="card" style="text-align:center;color:var(--gray-500)">Selecciona un pabellón primero</div>`;
    return;
  }
  panel.innerHTML = '<div class="spin"></div>';

  const hoy      = new Date();
  const desde    = todayISO();
  const hasta    = new Date(hoy); hasta.setDate(hoy.getDate() + 6); // próximos 7 días
  const hastaISO = hasta.toLocaleDateString('en-CA');
  const nivelFil = document.getElementById('sel-nivel')?.value || '';

  try {
    // ── PASO 1: habitaciones de este pabellón (+ nivel si aplica) ─────────
    let qH = supabase.from('v2_habitaciones')
      .select('id_custom, numero_hab, nivel')
      .eq('pabellon_id', _pabellonId);
    if (nivelFil) qH = qH.eq('nivel', nivelFil);
    const { data: habs, error: eH } = await qH;
    if (eH) throw eH;

    // Mapa id_custom → datos hab para lookup O(1)
    const habMap = {};
    (habs || []).forEach(h => { habMap[h.id_custom] = h; });
    const habIds = new Set(Object.keys(habMap));

    // ── PASO 2: asignaciones activas con salida en los próximos 7 días ────
    // No filtramos por cama en la query — lo hacemos en JS con el id_cama
    const { data: proximas, error: eA } = await supabase
      .from('v2_asignaciones')
      .select('nombre_huesped, rut_huesped, fecha_salida_programada, id_cama, v2_empresas(nombre)')
      .gte('fecha_salida_programada', desde)
      .lte('fecha_salida_programada', hastaISO)
      .is('fecha_checkout', null);
    if (eA) throw eA;

    // Filtrar: extraer habitacion_id de id_cama ("COPC000449-C1" → "COPC000449")
    const filtradas = (proximas || [])
      .map(b => {
        const partes = (b.id_cama || '').split('-');
        const habId  = partes.length > 1 ? partes.slice(0, -1).join('-') : b.id_cama;
        return { ...b, _hab: habMap[habId] || null };
      })
      .filter(b => b._hab !== null);

    const nivelLabel = nivelFil ? ` · Piso ${nivelFil}` : '';

    if (!filtradas.length) {
      panel.innerHTML = `
        <div class="card" style="text-align:center">
          <div style="font-size:36px;margin-bottom:8px">📭</div>
          <div style="font-weight:700;color:var(--gray-700)">Sin bajadas próximas</div>
          <div style="font-size:12px;color:var(--gray-500);margin-top:4px">No hay salidas en los próximos 7 días para ${_pabNombre}${nivelLabel}</div>
        </div>`;
      return;
    }

    // Agrupar por fecha → empresa
    const porFecha = {};
    filtradas.forEach(b => {
      const f   = b.fecha_salida_programada;
      const emp = b.v2_empresas?.nombre || 'Sin empresa';
      if (!porFecha[f]) porFecha[f] = {};
      if (!porFecha[f][emp]) porFecha[f][emp] = [];
      porFecha[f][emp].push(b);
    });

    const diasLabel = ['Hoy','Mañana','Pasado mañana','En 3 días','En 4 días','En 5 días','En 6 días'];

    panel.innerHTML = `<div class="sec-title">📤 Próximas bajadas · ${_pabNombre}${nivelLabel} <span class="badge">${filtradas.length}</span></div>` +
      Object.entries(porFecha).sort().map(([fecha, empresas]) => {
        const diffMs = new Date(fecha+'T12:00:00') - new Date(desde+'T00:00:00');
        const diffD  = Math.round(diffMs / 86400000);
        const etiq   = diasLabel[diffD] || fecha;
        const fmtFecha = new Date(fecha+'T12:00:00').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
        const totalDia = Object.values(empresas).reduce((s,a) => s+a.length, 0);
        const col = diffD === 0 ? '#ef4444' : diffD === 1 ? '#f59e0b' : '#6366f1';
        return `
          <div style="margin-bottom:6px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <span style="background:${col};color:white;border-radius:8px;padding:4px 12px;font-size:12px;font-weight:800">${etiq}</span>
              <span style="font-size:12px;color:var(--gray-500)">${fmtFecha}</span>
              <span style="margin-left:auto;font-size:13px;font-weight:800;color:#ef4444">${totalDia} camas</span>
            </div>
            ${Object.entries(empresas).map(([emp, rows]) => `
              <div class="card" style="margin-bottom:8px">
                <div style="display:flex;justify-content:space-between;align-items:flex-start">
                  <div>
                    <div class="dep-emp">${emp}</div>
                    <div class="dep-sub">${_pabNombre}${nivelLabel}</div>
                  </div>
                  <div>
                    <div class="dep-num">${rows.length}</div>
                    <div class="dep-lbl">camas</div>
                  </div>
                </div>
                <div style="margin-top:8px;border-top:1px solid var(--gray-100);padding-top:8px">
                  ${rows.map(r => `
                    <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px">
                      <span style="font-weight:600;color:var(--gray-700)">${r.nombre_huesped}</span>
                      <span style="color:var(--gray-500);font-family:monospace">${r.rut_huesped}</span>
                    </div>`).join('')}
                </div>
              </div>`).join('')}
          </div>`;
      }).join('');

  } catch(err) {
    console.error('[bajadas]', err);
    panel.innerHTML = `<div class="card" style="color:#ef4444;font-weight:700">⚠️ ${err.message}</div>`;
  }
}

// ── Utils ───────────────────────────────────────────────────────────────
function todayISO() {
  return new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
}

// ═══════════════════════════════════════════════════════════════════════════
// 🆕 MEJORAS: Auto-guardado · Limpieza · PDF
// ═══════════════════════════════════════════════════════════════════════════

let _limpiezaHoy = {}; // habitacion_id → 'limpia' | 'sucia' | 'proceso'

// ── Claves de localStorage ────────────────────────────────────────────────
function draftKey()        { return `censo_draft_${_pabellonId}_${todayISO()}`; }
function limpiezaKey(hId)  { return `censo_limp_${_pabellonId}_${hId}_${todayISO()}`; }

// ── Auto-guardado: guarda _censoHoy en localStorage cada cambio ──────────
function autoGuardar() {
  try { localStorage.setItem(draftKey(), JSON.stringify(_censoHoy)); } catch(_) {}
}

// ── Restaurar borrador guardado al cargar el pabellón ────────────────────
function restaurarDraft() {
  try {
    const raw = localStorage.getItem(draftKey());
    if (!raw) return;
    const saved = JSON.parse(raw);
    let restored = 0;
    Object.entries(saved).forEach(([hId, estado]) => {
      if (_habitaciones.find(h => h.id_custom === hId)) {
        _censoHoy[hId] = estado;
        restored++;
      }
    });
    if (restored > 0) {
      document.getElementById('draft-banner').style.display = 'flex';
    }
  } catch(_) {}
}

// ── Limpiar borrador tras guardar en Supabase ─────────────────────────────
function clearDraft() {
  try { localStorage.removeItem(draftKey()); } catch(_) {}
  const b = document.getElementById('draft-banner');
  if (b) b.style.display = 'none';
}

// ── Descartar borrador manualmente ───────────────────────────────────────
window.descartarDraft = function() {
  clearDraft();
  _censoHoy = {};
  const panel = document.getElementById('panel-censo');
  renderHabitaciones(panel);
  actualizarContador();
};

// ── Cargar estados de limpieza desde localStorage ─────────────────────────
function cargarLimpiezaLocal() {
  _limpiezaHoy = {};
  _habitaciones.forEach(h => {
    try {
      const v = localStorage.getItem(limpiezaKey(h.id_custom));
      if (v) _limpiezaHoy[h.id_custom] = v;
    } catch(_) {}
  });
}

// ── Actualizar contador de limpieza en la barra inferior ─────────────────
function actualizarContadorLimpieza() {
  const limpias = _habitaciones.filter(h => _limpiezaHoy[h.id_custom] === 'limpia').length;
  const el = document.getElementById('clean-counter-text');
  if (el) el.textContent = limpias > 0 ? `✅ ${limpias} limpias` : '';
}

// ── UI de limpieza por habitación ─────────────────────────────────────────
function cleaningUI(habId) {
  const cur = _limpiezaHoy[habId] || '';
  const opts = [
    { val: 'limpia',  lbl: '✅ Limpia',      col: '#10b981' },
    { val: 'sucia',   lbl: '🔴 Sucia',       col: '#ef4444' },
    { val: 'proceso', lbl: '⏳ En proceso',  col: '#f59e0b' },
  ];
  return `<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
    ${opts.map(o => `
      <button onclick="setLimpieza('${habId}','${o.val}')"
        style="flex:1;min-width:70px;padding:5px 8px;border:none;border-radius:8px;
               font-size:10px;font-weight:700;cursor:pointer;
               background:${cur===o.val ? o.col : '#f1f5f9'};
               color:${cur===o.val ? '#fff' : '#64748b'};
               transition:all .2s">${o.lbl}</button>`).join('')}
  </div>`;
}

// ── Guardar estado de limpieza ─────────────────────────────────────────────
window.setLimpieza = function(habId, estado) {
  _limpiezaHoy[habId] = estado;
  try { localStorage.setItem(limpiezaKey(habId), estado); } catch(_) {}
  // Refrescar solo los botones de limpieza de esa habitación
  const card = document.getElementById('rc-' + habId);
  if (card) {
    const limp = card.querySelector('.limpieza-btns');
    if (limp) limp.outerHTML = cleaningUI(habId);
    else {
      const rb = card.querySelector('.room-body');
      if (rb) rb.insertAdjacentHTML('beforeend', `<div class="limpieza-btns">${cleaningUI(habId)}</div>`);
    }
  }
  actualizarContadorLimpieza();
};

// ── Exportar PDF del Censo (con fallback offline) ───────────────────────

  }).join('');

    body{font-family:Arial,sans-serif;padding:20px;color:#1e293b;}
    @media print{
      button{display:none!important;}
      body{padding:10px;}
    }
  </style>
  </head><body>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #6366f1;padding-bottom:14px;margin-bottom:16px">
    <div>
      <h1 style="font-size:20px;font-weight:900;margin:0;color:#1e1b4b">Censo de Camas — PC Hotería</h1>
      <p style="margin:4px 0 0;font-size:12px;color:#64748b">${_pabNombre} · ${fecha} · ${_nombre}</p>
    </div>
    <div style="text-align:right">
      <div style="font-size:28px;font-weight:900;color:#6366f1">${marcadas}/${_habitaciones.length}</div>
      <div style="font-size:10px;color:#64748b">habitaciones censadas</div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
    <div style="background:#f1f5f9;border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:900;color:#6366f1">${marcadas}</div><div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700">Censadas</div></div>
    <div style="background:#ecfdf5;border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:900;color:#10b981">${limpias}</div><div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700">Limpias</div></div>
    <div style="background:#fef2f2;border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:900;color:#ef4444">${sucias}</div><div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700">Sucias</div></div>
    <div style="background:#fffbeb;border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:900;color:#f59e0b">${proceso}</div><div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700">En proceso</div></div>
  </div>
  <table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="background:#1e1b4b;color:white">
      <th style="padding:7px 10px;text-align:left;border:1px solid #312e81">Habitación</th>
      <th style="padding:7px 10px;text-align:left;border:1px solid #312e81">ID</th>
      <th style="padding:7px 10px;text-align:left;border:1px solid #312e81">Estado Censo</th>
      <th style="padding:7px 10px;text-align:left;border:1px solid #312e81">Limpieza</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <p style="margin-top:14px;font-size:9px;color:#94a3b8;text-align:center">PC Hotería · Aramark Chile · ${new Date().toLocaleString('es-CL')}</p>
  </body></html>`;

  try {
    // ── Intentar con html2pdf (si hay internet) ──
    if (!window.html2pdf) {
      await Promise.race([
        new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
          s.onload = res;
          s.onerror = () => rej(new Error('sin internet'));
          document.head.appendChild(s);
        }),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000))
      ]);
    }

    // html2pdf cargó OK — descarga directa
    const wrapper = document.createElement('div');
    wrapper.innerHTML = html;
    document.body.appendChild(wrapper);
    await html2pdf().set({
      margin: 6,
      filename: `censo_${_pabNombre.replace(/\s+/g,'_')}_${fecha}.pdf`,
      image: { type: 'jpeg', quality: 0.95 },
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(wrapper).save();
    document.body.removeChild(wrapper);
    toast('📄 PDF descargado', 2000);

  } catch(_) {
    // ── Fallback offline: abrir ventana e imprimir (Cmd+P → Guardar como PDF) ──
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const win  = window.open(url, '_blank');
    if (win) {
      toast('📄 Se abrió el censo — presiona ⌘P y elige "Guardar como PDF"', 5000);
    } else {
      // Último recurso: descarga directa del HTML
      const a = document.createElement('a');
      a.href = url; a.download = `censo_${_pabNombre.replace(/\s+/g,'_')}_${fecha}.html`;
      a.click();
      toast('📄 Archivo descargado (abrir con Word o Chrome)', 4000);
    }
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  }

  if (btn) { btn.textContent = '📄'; btn.disabled = false; }
};
</script>

</body>
</html>
